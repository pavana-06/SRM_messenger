<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Chat - Join</title>
    <style>
        :root {
            --bg1: #100d26;
            --bg2: #21124e;
            --accent1: #00e3ff;
            --accent2: #9f56ff;
            --text: #eff3ff;
            --muted: #b8c5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(0, 227, 255, 0.22), transparent 35%),
                radial-gradient(circle at 85% 70%, rgba(159, 86, 255, 0.3), transparent 35%),
                linear-gradient(130deg, var(--bg1), var(--bg2));
        }
        .container {
            width: 100%;
            max-width: 460px;
            border-radius: 22px;
            padding: 34px 28px;
            background: rgba(17, 20, 48, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.48), inset 0 0 70px rgba(0, 227, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 30px;
            color: #fff;
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 22px;
            font-size: 13px;
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #dce6ff; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(7, 10, 27, 0.56);
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(0, 227, 255, 0.22); }
        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: var(--muted);
            font-size: 12px;
        }
        .top-row a { color: #effbff; text-decoration: none; font-weight: 700; }
        .top-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join a Room</h1>
        <p class="subtitle">Logged in as <strong>{{ email }}</strong></p>

        <div class="top-row">
            <span>Choose a username + room</span>
            <a href="/logout">Logout</a>
        </div>

        <form action="/join" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter a display name" required>
            </div>

            <div class="form-group">
                <label for="room">Room Name</label>
                <input type="text" id="room" name="room" placeholder="e.g., CS101, Library, Study Group" required>
            </div>

            <button type="submit">Enter Chat</button>
        </form>
    </div>
</body>
</html>
