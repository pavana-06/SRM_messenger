<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Chat</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0e1025, #2a1661);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00e1ff, #9f56ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>⚡ University Chat</h2>

    <!-- ✅ SIMPLE JOIN FORM -->
    <form action="/join" method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="text" name="room" placeholder="Enter Room Name" required>
        <button type="submit">Join Chat</button>
    </form>

</div>

</body>
</html>
