<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(270deg, #0e1025, #2a1661, #0e1025);
    background-size: 600% 600%;
    animation: gradientMove 10s ease infinite;
}

/* Background animation */
@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ✨ Floating particles */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,225,255,0.2) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveDots 10s linear infinite;
    z-index: -1;
}

@keyframes moveDots {
    from { transform: translateY(0); }
    to { transform: translateY(-100px); }
}

/* ✨ Glass Card */
.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 0 20px rgba(0, 225, 255, 0.3),
        0 0 40px rgba(159, 86, 255, 0.2);

    padding: 40px;
    width: 320px;

    text-align: center;

    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

h2 {
    color: white;
    margin-bottom: 10px;
}

.subtitle {
    color: #bbb;
    font-size: 13px;
    margin-bottom: 25px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.1);
    color: white;

    transition: 0.3s;
}

input::placeholder {
    color: #aaa;
}

input:focus {
    box-shadow: 0 0 10px #00e1ff;
    transform: scale(1.03);
}

/* Button */
button {
    width: 100%;
    padding: 12px;

    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #00e1ff, #9f56ff);
    color: white;

    font-weight: bold;
    cursor: pointer;

    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #9f56ff;
}
</style>
</head>

<body>

<div class="container">
    <h2>⚡ University Chat</h2>
    <p class="subtitle">Join instantly. No login needed.</p>

    <form action="/join" method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="text" name="room" placeholder="Enter Room Name" required>
        <button type="submit">Join Chat 🚀</button>
    </form>
</div>

</body>
</html>
