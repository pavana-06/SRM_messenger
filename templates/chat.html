<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room - {{ room }}</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --bg1: #0d0f25;
            --bg2: #241453;
            --panel: rgba(15, 20, 48, 0.72);
            --stroke: rgba(255, 255, 255, 0.18);
            --accent1: #00e7ff;
            --accent2: #9f56ff;
            --txt: #edf2ff;
            --muted: #b7c5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--txt);
            background:
                radial-gradient(circle at 15% 15%, rgba(0, 231, 255, 0.25), transparent 28%),
                radial-gradient(circle at 85% 75%, rgba(159, 86, 255, 0.34), transparent 32%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
        }
        .chat-container {
            max-width: 980px;
            margin: 14px auto;
            height: calc(100vh - 28px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            background: var(--panel);
            border: 1px solid var(--stroke);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45), inset 0 0 80px rgba(0, 231, 255, 0.04);
            backdrop-filter: blur(10px);
        }
        .chat-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(8, 11, 30, 0.35);
        }
        .room-info h2 { font-size: 21px; margin-bottom: 4px; color: #ffffff; }
        .room-info p { font-size: 13px; color: var(--muted); }
        .leave-btn {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 9px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .leave-btn:hover { background: rgba(255, 255, 255, 0.22); }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background:
                radial-gradient(circle at 10% 10%, rgba(0, 231, 255, 0.06), transparent 20%),
                radial-gradient(circle at 90% 90%, rgba(159, 86, 255, 0.1), transparent 25%);
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-items: flex-end;
        }

        .message.other {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 64%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .message.own .message-bubble {
            background: linear-gradient(135deg, rgba(0, 231, 255, 0.23), rgba(159, 86, 255, 0.26));
            border-bottom-right-radius: 3px;
        }
        .message.other .message-bubble {
            background: rgba(255, 255, 255, 0.09);
            border-bottom-left-radius: 3px;
        }

        .message-header { font-size: 12px; font-weight: 700; margin-bottom: 4px; color: #9ee8ff; }

        .message.own .message-header {
            display: none;
        }

        .message-text { font-size: 15px; color: #f3f6ff; line-height: 1.45; }

        .message-time { font-size: 11px; color: #b7c5ff; margin-top: 4px; text-align: right; }

        .system-message {
            text-align: center;
            margin: 15px 0;
        }

        .system-bubble {
            display: inline-block;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #d4deff;
        }

        .input-container {
            padding: 14px 16px;
            background: rgba(9, 12, 30, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        #messageInput:focus { border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(0, 231, 255, 0.2); }

        #sendBtn {
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        #sendBtn:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(0, 231, 255, 0.25); }

        #sendBtn:active {
            transform: scale(0.98);
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.35); border-radius: 3px; }
        .messages-container::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.55); }

        @media (max-width: 768px) {
            .message-bubble {
                max-width: 80%;
            }

            .chat-header {
                padding: 15px;
            }

            .room-info h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="room-info">
                <h2>📚 {{ room }}</h2>
                <p>Logged in as <strong>{{ username }}</strong></p>
            </div>
            <button class="leave-btn" onclick="leaveRoom()">Leave Room</button>
        </div>

        <div class="messages-container" id="messages"></div>

        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        const username = "{{ username }}";
        const room = "{{ room }}";
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Join room on load
        socket.emit('join', { username: username, room: room });

        // Handle user joined
        socket.on('user_joined', function(data) {
            addSystemMessage(`${data.username} joined the room`, data.timestamp);
        });

        // Handle new message
        socket.on('new_message', function(data) {
            addMessage(data.username, data.message, data.timestamp);
        });

        // Handle user left
        socket.on('user_left', function(data) {
            addSystemMessage(`${data.username} left the room`, data.timestamp);
        });

        // Handle errors
        socket.on('error', function(data) {
            alert(data.message);
            window.location.href = '/';
        });

        // Send message
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                socket.emit('send_message', {
                    username: username,
                    message: message,
                    room: room
                });
                messageInput.value = '';
                messageInput.focus();
            }
        }

        // Add message to chat
        function addMessage(sender, text, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = sender === username ? 'message own' : 'message other';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (sender !== username) {
                const header = document.createElement('div');
                header.className = 'message-header';
                header.textContent = sender;
                bubble.appendChild(header);
            }

            const messageText = document.createElement('div');
            messageText.className = 'message-text';
            messageText.textContent = text;
            bubble.appendChild(messageText);

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = timestamp;
            bubble.appendChild(time);

            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Add system message
        function addSystemMessage(text, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';

            const bubble = document.createElement('div');
            bubble.className = 'system-bubble';
            bubble.textContent = `${text} • ${timestamp}`;

            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Auto-scroll to bottom
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Leave room
        function leaveRoom() {
            if (confirm('Are you sure you want to leave this room?')) {
                window.location.href = '/';
            }
        }

        // Send message on button click
        sendBtn.addEventListener('click', sendMessage);

        // Send message on Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
